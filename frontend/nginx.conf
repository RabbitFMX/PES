server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing (React Router): serve index.html for any unknown path
    # so deep links / page refreshes don't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames under /assets, so they can be cached
    # forever — a new build changes the name.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
