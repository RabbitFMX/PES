# nginx config for the PES frontend SPA.
# Serves the static Vite bundle and falls back to index.html so that
# client-side routes (React Router) resolve on a hard refresh / deep link.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets — cheap win for JS/CSS over the wire.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths render the app shell, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entry point, so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
